services:
  vault:
    image: hashicorp/vault:1.17
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - kms-net

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - kms-net

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/demo-bucket &&
        echo 'Bucket demo-bucket ready'
      "
    networks:
      - kms-net

  vault-init:
    image: hashicorp/vault:1.17
    container_name: vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
    entrypoint:
      - /bin/sh
      - -c
      - |
        vault secrets enable transit || true &&
        vault write -f transit/keys/demo-kek &&
        printf 'path "transit/encrypt/demo-kek" { capabilities = ["update"] }\npath "transit/decrypt/demo-kek" { capabilities = ["update"] }\npath "transit/datakey/plaintext/demo-kek" { capabilities = ["update"] }\n' \
          | vault policy write s3-proxy-policy - &&
        vault token create -policy=s3-proxy-policy -field=token > /shared/s3proxy-token &&
        echo 'Vault initialized'
    volumes:
      - shared-tokens:/shared
    networks:
      - kms-net

  s3-proxy:
    build:
      context: ./s3-proxy
      dockerfile: Dockerfile
    container_name: s3-proxy
    ports:
      - "8080:8080"
    environment:
      S3PROXY_LISTEN: ":8080"
      S3PROXY_VAULT_ADDR: http://vault:8200
      S3PROXY_VAULT_KEY: demo-kek
      S3PROXY_MINIO_ENDPOINT: http://minio:9000
      S3PROXY_MINIO_ACCESS_KEY: minioadmin
      S3PROXY_MINIO_SECRET_KEY: minioadmin
    volumes:
      - shared-tokens:/shared
    depends_on:
      vault:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks:
      - kms-net

  s3-proxy-go:
    build:
      context: ./s3-proxy-go
      dockerfile: Dockerfile
    container_name: s3-proxy-go
    ports:
      - "8081:8080"
    environment:
      S3PROXY_LISTEN: ":8080"
      S3PROXY_VAULT_ADDR: http://vault:8200
      S3PROXY_VAULT_KEY: demo-kek
      S3PROXY_MINIO_ENDPOINT: http://minio:9000
      S3PROXY_MINIO_ACCESS_KEY: minioadmin
      S3PROXY_MINIO_SECRET_KEY: minioadmin
    volumes:
      - shared-tokens:/shared
    depends_on:
      vault:
        condition: service_healthy
      minio:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks:
      - kms-net

volumes:
  minio-data:
  shared-tokens:

networks:
  kms-net:
    driver: bridge
